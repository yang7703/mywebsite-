<style>
#lc-tool-root{--lc-red:var(--c-red);--lc-gold:var(--c-gold);--lc-gold-light:var(--c-gold-light);--lc-ink:var(--c-ink);--lc-paper:var(--c-paper-card);--lc-paper-2:var(--c-paper-2);--lc-textsoft:var(--c-text-soft);--lc-textfaint:var(--c-text-faint);font-family:"Noto Sans SC",sans-serif;color:var(--lc-ink);}

<div class="lc-header">
  <div class="lc-eyebrow">24 SOLAR TERMS</div>
  <h1 class="lc-title lc-serif">二十四节气</h1>
  <p class="lc-sub">查询任意年份全年24个节气的准确日期与时间（北京时间）</p>
</div>

<div class="lc-card">
  <div class="lc-panel">
    <div class="lc-row">
      <div class="lc-field"><label>选择年份</label><select id="jq-year"></select></div>
      <button class="lc-btn" onclick="jqCalc()">查 询</button>
    </div>
    <div class="lc-term-grid" id="jq-grid"></div>
  </div>
</div>

<div class="lc-article">
  <h2 class="lc-serif">二十四节气是如何计算的？</h2>
  <p>二十四节气本质上是太阳在黄道上运行到特定黄经度数的时刻，每15°黄经对应一个节气，因此本质上是天文历法，而非阴历或阳历的固定日期。本工具采用天文近似公式计算，精度可达分钟级，足以满足日常查询、择日参考等需求。</p>
  <h2 class="lc-serif">节气和节日有什么关系？</h2>
  <p>清明既是节气也是传统节日；冬至在很多地区也有"冬至大如年"的习俗；此外，节气还与农事安排、中医养生、传统命理（八字排盘以"节"划分月柱）密切相关，是中国传统历法体系的重要组成部分。</p>
</div>

</div>
</div>

<script src="/assets/mingli-core.js"></script>
<script>
(function(){
"use strict";
var $=function(id){return document.getElementById(id);};
var SEASON=["winter","winter","spring","spring","spring","spring","spring","spring","summer","summer","summer","summer","summer","summer","autumn","autumn","autumn","autumn","autumn","autumn","winter","winter","winter","winter"];

function init(){
  var sel=$("jq-year");
  var today=new Date().getFullYear();
  for(var y=1900;y<=2100;y++){
    var opt=document.createElement("option");opt.value=y;opt.textContent=y+"年";sel.appendChild(opt);
  }
  sel.value=today;
}
init();

window.jqCalc=function(){
  var y=parseInt($("jq-year").value,10);
  var terms=window.MingliCore.getYearTerms(y);
  var html=terms.map(function(t,i){
    var timeStr=String(t.hh).padStart(2,"0")+":"+String(t.mm).padStart(2,"0");
    return '<div class="lc-term-card season-'+SEASON[i]+'"><div><div class="tc-name">'+t.name+'</div><div class="tc-idx">第'+(i+1)+'个节气</div></div><div><div class="tc-date">'+t.m+'月'+t.d+'日</div><div class="tc-time">'+timeStr+'（北京时间）</div></div></div>';
  }).join("");
  $("jq-grid").innerHTML=html;
};
jqCalc();
})();
</script>
